name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build Pages artifact
        run: |
          set -euo pipefail

          rm -rf public
          mkdir -p public/assets public/data

          cp index.html styles.css script.js CNAME .nojekyll robots.txt sitemap.xml public/
          cp assets/site-icon.svg public/assets/
          cp -R assets/thumbs public/assets/
          python3 - <<'PY'
          import json
          import shutil
          from pathlib import Path

          data = json.loads(Path("data/prompts.json").read_text())
          imported_assets = sorted({
              prompt.get("image")
              for prompt in data.get("prompts", [])
              if str(prompt.get("image") or "").startswith("assets/imported/")
          })

          for asset in imported_assets:
              source = Path(asset)
              if not source.is_file():
                  continue
              target = Path("public") / asset
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(source, target)
          PY
          cp data/imported-prompts.json public/data/
          cp data/model-page-assets.json public/data/
          cp -R gpt-image-2-prompts seedream-5-pro-prompts seedance-2-prompts grok-imagine-prompts gemini-3-pro-prompts public/
          cp data/prompts.json public/data/

          du -sh public
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
