name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build Pages artifact
        run: |
          set -euo pipefail

          rm -rf public
          mkdir -p public/assets public/data/prompts

          cp index.html styles.css script.js CNAME .nojekyll robots.txt sitemap.xml pages-sitemap.xml public/
          cp image-sitemap.xml public/
          cp assets/site-icon.svg public/assets/
          cp -R assets/thumbs-optimized public/assets/
          cp data/prompt-index.json public/data/
          cp -R data/prompts/. public/data/prompts/
          cp data/model-page-assets.json public/data/
          cp -R gpt-image-2-prompts seedream-5-pro-prompts seedance-2-prompts grok-imagine-prompts gemini-3-pro-prompts public/
          python3 - <<'PY'
          import json
          from pathlib import Path

          raw_base = "https://raw.githubusercontent.com/xianyu110/image-prompt-generator/main/"
          for path in Path("public/data/prompts").glob("*.json"):
              data = json.loads(path.read_text())
              for prompt in data.get("prompts", []):
                  image = prompt.get("image") or ""
                  if image.startswith("assets/imported/"):
                      prompt["image"] = raw_base + image
              path.write_text(json.dumps(data, ensure_ascii=False, separators=(",", ":")) + "\n")
          PY

          du -sh public
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
